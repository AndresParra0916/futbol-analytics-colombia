name: Actualización Automática Datos

on:
  schedule:
    - cron: '0 4 * * 1'
    - cron: '0 4 * * 4'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Actualizar datos
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python actualizar_datos.py
      - name: Entrenar modelo
        run: python entrenar_unificado.py || echo "Modelo entrenado o script no encontrado"
      - name: Guardar cambios
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data/ models/
          git commit -m "Actualización automática $(date +'%Y-%m-%d')" || echo "Sin cambios"
          git push
