name: Probar workflow

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Ejecutar script
        run: python main.py
      - name: Listar archivos generados
        run: |
          echo "=== Directorio actual ==="
          ls -la
          echo "=== Contenido de data (si existe) ==="
          ls -la data/ || echo "data/ no existe"
          echo "=== Contenido de reports (si existe) ==="
          ls -la reports/ || echo "reports/ no existe"
          echo "=== Contenido de models (si existe) ==="
          ls -la models/ || echo "models/ no existe"
           - name: Guardar cambios automáticamente
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data reports models
          git diff --staged --quiet || git commit -m "Actualización automática: datos y reportes"
          git push
