   name: Probar workflow

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Ejecutar script
        run: python main.py
      - name: Guardar cambios automáticamente
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualización automática: datos y reportes"
          branch: main
