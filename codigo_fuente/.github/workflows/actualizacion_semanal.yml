name: Actualizar datos del Dashboard

on:
  schedule:
    # Ejecuta los martes y jueves a las 10:00 UTC (5:00 AM hora Colombia)
    - cron: '0 10 * * 2,4'
  workflow_dispatch:  # Permite ejecución manual desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script de actualización
        run: python actualizar_datos.py
        env:
          API_KEY: ${{ secrets.API_KEY }}

      - name: Commit y push de los cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv models/*.pkl
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de datos"
          git push